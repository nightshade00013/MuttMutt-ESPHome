################# Base-Configuration-File #########################
# NOTE: This is the global configuration for all MuttMutt Home devices.
# Changing a setting here updates every device that includes this package.
# This file also relies on a secrets file.  If you are using the HomeAssistant 
# version of the ESPHome Builder you can simply click the "Secrets" button 
# and include the secrets in a format similar to the ones in my MuttMutt Home
# repository.  
# 
# https://github.com/nightshade00013/MuttMutt-ESPHome
#
# You can simply download or copy and paste the contents of this file into
# an ESPHome Builder file named base-config.yaml
#
# You can show your thanks for this by heading over to:
# https://www.muttmutt.us/your-welcome-here-is-how-you-can-say-thank-you/
#####################################################################

esphome:
  # This ensures the device name is always what we set in the 'substitutions' block
  name: ${devicename}
  project:
    name: "MuttMutt.Home" #You can rename this as you choose.
    version: "2026.3.1" #Updated to support ESPhome of this version or later.

# Global Wi-Fi and Connectivity
wifi:
  ssid: !secret wifi_ssid #This refferences your Secrets.yaml file
  password: !secret wifi_password
  
  # Fallback AP for if the main router dies
  ap:
    ssid: "${disp_name} Fallback"
    password: !secret ap_password

# Security & Communication
api:  # Comment out this section if using MQTT with (#)
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

#mqtt:  # Comment out this section if using API with (#) 
#  broker: !secret mqtt_broker
#  username: !secret mqtt_user
#  password: !secret mqtt_pass

# Debugging Tools
logger:
  level: DEBUG # High detail for the Successor to see what's happening

web_server:
  port: 80 # Allows visiting the device IP in a browser for instant logs

captive_portal:

# Time Synchronization
time:
  - platform: homeassistant
    id: homeassistant_time

# Common Sensors for every device
sensor:
  - platform: wifi_signal
    name: "${disp_name} WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    icon: "mdi:wifi-arrow-left-right"

  - platform: copy
    source_id: wifi_signal_db
    name: "${disp_name} WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    device_class: "signal_strength"
    entity_category: "diagnostic"
    icon: "mdi:wifi-strength-4"
    
  - platform: uptime
    name: "${disp_name} Uptime"
    entity_category: diagnostic

switch:
  - platform: restart
    name: "${disp_name} Restart"
    entity_category: config
