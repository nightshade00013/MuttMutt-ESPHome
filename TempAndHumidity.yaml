# =========================================================================
# PROJECT: MuttMutt Home - Environment Sensors
# PURPOSE: Temperature and Humidity Monitoring
# HARDWARE: ESP8266 (ESP-12E) + DHT Sensor
#
# This is a simple ESP Board with a DHT sensor to measure temperature and 
# humidity.  You can easily add other things including motion sensors, light
# sensors or just about anything else that you can get a sensor compatible with
# arduino.
#
# You can show your thanks for this by heading over to:
# https://www.muttmutt.us/your-welcome-here-is-how-you-can-say-thank-you/
#
# =========================================================================

substitutions:
  disp_name: "TempHumidSensor" #Can be uppercase or lowercase
  devicename: temphumidsensor #Must be lowercase
  update_time: 60s 

packages:
  # Inherits centralized WiFi credentials, API keys, and OTA settings
  remote_base: !include base-config.yaml

esp8266:
  board: esp12e

# -----------------------------------------------------------------------
# NETWORK: Manual Configuration - Comment out after wifi: to use DHCP
# -----------------------------------------------------------------------
wifi:
  use_address: 192.168.1.10
  manual_ip:
    static_ip: 192.168.1.10
    gateway: 192.168.1.1
    subnet: 255.255.255.0
  reboot_timeout: 0s
# -----------------------------------------------------------------------
# SENSORS: DHT Temperature & Humidity
# -----------------------------------------------------------------------
sensor:
  - platform: dht
    model: AUTO_DETECT
    pin: GPIO13
    temperature:
      name: "${disp_name} Temperature"
      unit_of_measurement: "°F"
      icon: "mdi:thermometer"
      accuracy_decimals: 1
      filters:
        # Calibration: Celsius to Fahrenheit conversion + 32 plus or minus temp offset
        - lambda: return (x * 1.8) + 32.0;
    humidity:
      name: "${disp_name} Humidity"
      unit_of_measurement: "%"
      icon: "mdi:water-percent"
      accuracy_decimals: 0
    update_interval: ${update_time}


    entity_category: "diagnostic"
    icon: "mdi:wifi-strength-4"
